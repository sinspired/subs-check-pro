<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析报告 - Subs-Check-PRO</title>
    <link rel="icon" type="image/svg+xml" href="/static/icon/favicon.svg" />
    <link rel="stylesheet" href="/static/css/admin.css">
    <script src="/static/js/libs/yaml.bundle.js?v20260109"></script>
    <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
        margin: 0; padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
    }

    /* ════════════════════════════════════════
       登录场景
    ════════════════════════════════════════ */
    .login-scene {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
        min-height: 100vh;
    }

    .login-card {
        width: 100%;
        max-width: 400px;
        border-radius: 16px;
        padding: 28px 28px 24px;
        box-shadow: var(--glass-shadow);
        animation: fadeUp 0.3s ease-out;
    }

    .login-bottom {
        margin-top: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    /* ════════════════════════════════════════
       报告场景：顶栏 + 侧边栏/内容 的经典布局
    ════════════════════════════════════════ */
    .report-scene {
        display: none;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
    }

    /* 顶部导航栏（大小屏共用） */
    .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 52px;
        padding: 0 16px 0 20px;
        border-bottom: 1px solid var(--border);
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        flex-shrink: 0;
        z-index: 100;
    }

    .topbar-brand {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
    }
    .topbar-brand img { width: 16px; height: 16px; }

    .topbar-meta {
        flex: 1;
        text-align: center;
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 0.04em;
        padding: 0 12px;
    }

    .topbar-actions {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    /* 顶栏小按钮（主题切换 & 退出，样式统一） */
    .topbar-btn {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 5px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-size: 11px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s, background 0.15s;
        white-space: nowrap;
    }
    .topbar-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
    .topbar-btn:hover {
        color: var(--fg);
        border-color: var(--fg);
        background: color-mix(in srgb, var(--fg) 6%, transparent);
    }
    .topbar-btn.danger:hover {
        color: var(--danger);
        border-color: var(--danger);
        background: color-mix(in srgb, var(--danger) 8%, transparent);
    }

    /* ── 主体区域：侧边栏 + 内容（大屏） ── */
    .body-area {
        display: flex;
        flex: 1;
        overflow: hidden;
    }

    /* ════════════════════════════════════════
       侧边栏（大屏显示）
    ════════════════════════════════════════ */
    .sidebar {
        width: 180px;
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        background: var(--glass-bg);
        display: flex;
        flex-direction: column;
        justify-content: flex-start; /* 确保按钮靠上排列 */
         gap: 2px;
        padding: 12px 8px;
        overflow-y: auto;
        scrollbar-width: none;
    }
    .sidebar::-webkit-scrollbar { display: none; }

    .sidebar-label {
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        padding: 4px 8px 8px;
        opacity: 0.6;
    }

    .sidebar-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: 8px;
        border: none;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: color 0.15s, background 0.15s;
        text-align: left;
        width: 100%;
    }
    .sidebar-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
    .sidebar-btn .s-badge {
        margin-left: auto;
        font-size: 9px;
        font-weight: 700;
        padding: 1px 5px;
        border-radius: 99px;
        background: var(--border);
        color: var(--muted);
        flex-shrink: 0;
    }
    .sidebar-btn:hover {
        color: var(--fg);
        background: color-mix(in srgb, var(--fg) 6%, transparent);
    }
    .sidebar-btn.active {
        color: var(--accent);
        background: color-mix(in srgb, var(--accent) 10%, transparent);
    }
    .sidebar-btn.active .s-badge {
        background: color-mix(in srgb, var(--accent) 20%, transparent);
        color: var(--accent);
    }

    .sidebar-divider {
        display: block;              /* 确保是块级显示 */
        height: 0;                   /* 高度靠边框撑开 */
        border-top: 1px solid var(--border); /* 使用 border 替代 background 更稳定 */
        margin: 4px 4px;             /* 上下边距：让订阅按钮组稍微拉开一点点距离 */
        flex-shrink: 0;              /* 防止被压缩 */
        align-self: stretch;         /* 强制拉伸宽度，防止宽度为 0 */
    }

    /* ════════════════════════════════════════
       顶部 Tab 栏（小屏显示）
    ════════════════════════════════════════ */
    .tab-bar {
        display: none; /* 默认隐藏，小屏显示 */
        align-items: center;
         justify-content: center; /* 小屏时按钮水平居中 */
        gap: 2px;
        padding: 0 12px;
        height: 44px;
        border-bottom: 1px solid var(--border);
        background: var(--glass-bg);
        overflow-x: auto;
        scrollbar-width: none;
        flex-shrink: 0;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 8px;
        border: none;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        white-space: nowrap;
        transition: color 0.15s, background 0.15s;
        flex-shrink: 0;
    }
    .tab-btn svg { width: 13px; height: 13px; }
    .tab-btn:hover { color: var(--fg); background: color-mix(in srgb, var(--fg) 6%, transparent); }
    .tab-btn.active {
        color: var(--accent);
        background: color-mix(in srgb, var(--accent) 10%, transparent);
    }

    /* ════════════════════════════════════════
       内容区（大屏：侧边栏右侧；小屏：Tab 下方）
    ════════════════════════════════════════ */
    .content-area {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    /* 小屏时 tab-bar 嵌入 content-area 上方 */
    .tab-content {
        display: none;
        flex: 1;
        overflow-y: auto;
        padding: 20px 24px;
    }
    .tab-content.active { display: block; }

    .tab-inner {
        max-width: 1000px;
        margin: 0 auto;
    }

    /* ════════════════════════════════════════
       响应式断点
    ════════════════════════════════════════ */
    @media (max-width: 720px) {
        .sidebar    { display: none; }
        .tab-bar    { display: flex; }
        .topbar-meta { display: none; }
        .tab-btn span { display: none; } /* 小屏只显示图标 */
        .tab-content { padding: 16px; }
        .overview-grid { grid-template-columns: 1fr; }
        .info-chips    { grid-template-columns: repeat(2, 1fr); }
        .geo-split     { grid-template-columns: 1fr; }
        .geo-col + .geo-col { border-left: none; border-top: 1px solid var(--border); }
    }

    /* ════════════════════════════════════════
       通用组件
    ════════════════════════════════════════ */
    .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 10px;
        border-radius: 99px;
        font-size: 9px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 16px;
        border: 1px solid var(--border);
        color: var(--idle);
    }

    h1 {
        font-size: 15px;
        font-weight: 600;
        margin: 0 0 6px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        letter-spacing: 0.02em;
        text-transform: uppercase;
    }
    h1 svg { width: 16px; height: 16px; flex-shrink: 0; }

    .desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin: 0 0 18px; }

    .section-title {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin: 0 0 10px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .section-title-toggle {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin: 0 0 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        user-select: none;
    }
    .toggle-line    { flex: 1; height: 1px; background: var(--border); }
    .toggle-chevron { width: 11px; height: 11px; flex-shrink: 0; transition: transform 0.2s; }
    .toggle-chevron.open { transform: rotate(180deg); }

    /* 登录表单 */
    .auth-area  { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }

    .auth-input {
        width: 100%;
        padding: 11px 14px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        background: var(--input-bg);
        color: var(--fg);
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        font-family: inherit;
    }
    .auth-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
    }
    .auth-input.error {
        border-color: var(--danger);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--danger) 12%, transparent);
    }
    .auth-hint { font-size: 12px; color: var(--danger); min-height: 16px; margin: 0; }

    .btn-auth {
        width: 100%;
        padding: 11px 14px;
        border-radius: 10px;
        border: none;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        transition: opacity 0.18s, transform 0.12s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-top: 4px;
    }
    .btn-auth:hover   { opacity: 0.88; transform: translateY(-1px); }
    .btn-auth:active  { opacity: 0.95; transform: translateY(0); }
    .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-auth svg     { width: 15px; height: 15px; flex-shrink: 0; }

    .retry-area { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .retry-msg  { font-size: 13px; color: var(--muted); margin: 0; line-height: 1.6; }

    .card-footer {
        margin-top: 22px;
        padding-top: 14px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .brand-info {
        display: flex; align-items: center; gap: 7px;
        font-size: 12px; font-weight: 700; color: var(--muted);
    }
    .brand-info img { width: 16px; height: 16px; }
    .footer-meta { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

    /* ════════════════════════════════════════
       Tab 1：概览
    ════════════════════════════════════════ */

    /* 摘要：结构化高亮版 */
    .summary-card {
        padding: 16px 18px;
        background: var(--input-bg);
        border-radius: 12px;
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        margin-bottom: 16px;
        line-height: 1.8;
    }
    .summary-title {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--accent);
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .summary-title svg { width: 11px; height: 11px; }
    /* 摘要正文：数字自动高亮 */
    .summary-body {
        font-size: 13px;
        color: var(--fg);
        line-height: 1.9;
    }
    .summary-body .num {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        color: var(--accent);
        background: color-mix(in srgb, var(--accent) 10%, transparent);
        padding: 0 3px;
        border-radius: 3px;
        font-size: 12px;
    }
    .summary-body .num-ok  { color: var(--success); background: color-mix(in srgb, var(--success) 10%, transparent); }
    .summary-body .num-warn { color: var(--warning); background: color-mix(in srgb, var(--warning) 10%, transparent); }

    /* 摘要折叠（文本过长时） */
    .summary-body.collapsed {
        display: -webkit-box;
        -webkit-line-clamp: 4;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    .summary-toggle {
        font-size: 11px;
        color: var(--accent);
        cursor: pointer;
        margin-top: 6px;
        display: inline-block;
    }

    /* 4 统计芯片 */
    .info-chips {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 16px;
    }
    .info-chip {
        padding: 14px 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--glass-bg);
        text-align: center;
    }
    .chip-value { font-size: 18px; font-weight: 700; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chip-label { font-size: 10px; color: var(--muted); margin-top: 4px; }
    .chip-accent .chip-value { color: var(--accent); }

    /* 概览双列：线路质量 + 快速导航 */
    .overview-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .stat-panel {
        padding: 16px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--glass-bg);
    }
    .panel-title {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--muted);
        margin-bottom: 12px;
    }

    .quality-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .quality-item {
        flex: 1; text-align: center; padding: 12px 4px;
        border-radius: 8px; background: var(--input-bg); border: 1px solid var(--border);
    }
    .quality-val   { font-size: 20px; font-weight: 700; }
    .quality-label { font-size: 10px; color: var(--muted); margin-top: 4px; }

    .cf-breakdown { display: flex; flex-direction: column; gap: 5px; }
    .cf-group { display: flex; align-items: flex-start; gap: 6px; }
    .cf-group-title { flex-shrink: 0; width: 68px; font-weight: 600; padding-top: 2px; font-size: 10px; }
    .cf-tags  { display: flex; flex-wrap: wrap; gap: 3px; }
    .cf-tag   {
        display: inline-flex; align-items: center; gap: 2px;
        padding: 1px 6px; border-radius: 99px;
        border: 1px solid var(--border); font-size: 10px; background: var(--glass-bg);
    }
    .cf-tag em { font-style: normal; color: var(--muted); }

    /* 快速导航卡片 */
    .nav-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--input-bg);
        cursor: pointer;
        font-family: inherit;
        color: var(--fg);
        transition: border-color 0.15s, background 0.15s;
        text-align: left;
        width: 100%;
        margin-bottom: 6px;
    }
    .nav-card:last-child { margin-bottom: 0; }
    .nav-card:hover {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent) 6%, transparent);
    }
    .nav-card-left  { display: flex; align-items: center; gap: 8px; }
    .nav-card-left svg { width: 13px; height: 13px; color: var(--muted); flex-shrink: 0; }
    .nav-card-label { font-size: 13px; font-weight: 600; }
    .nav-card-right {
        font-size: 11px;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 4px;
    }
    .nav-card-right svg { width: 11px; height: 11px; opacity: 0.5; }

    /* ════════════════════════════════════════
       Tab 2：地理分布
    ════════════════════════════════════════ */
    .geo-view {
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--glass-bg);
        overflow: hidden;
        margin-bottom: 4px;
    }
    /* 地图插槽（future: 替换内部内容即可） */
    .map-slot {
        min-height: 220px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--input-bg);
        border-bottom: 1px dashed color-mix(in srgb, var(--border) 80%, transparent);
        position: relative;
    }
    .map-slot-hint {
        text-align: center;
        opacity: 0.35;
    }
    .map-slot-hint svg { width: 28px; height: 28px; margin: 0 auto 6px; display: block; }
    .map-slot-hint span { font-size: 11px; color: var(--muted); }

    /* 条形图区分两列 */
    .geo-split { display: grid; grid-template-columns: 1fr 1fr; }
    .geo-col   { padding: 14px 16px; }
    .geo-col + .geo-col { border-left: 1px solid var(--border); }

    .geo-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .geo-key { font-size: 11px; font-weight: 600; width: 28px; flex-shrink: 0; color: var(--fg); }
    .geo-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .geo-bar { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.5s ease; }
    .geo-val { font-size: 11px; color: var(--muted); width: 22px; text-align: right; flex-shrink: 0; }

    /* ════════════════════════════════════════
       Tab 3：协议分析
    ════════════════════════════════════════ */
    .proto-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .proto-key { font-size: 11px; font-weight: 600; width: 56px; flex-shrink: 0; }
    .proto-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .proto-bar { height: 100%; background: var(--warning); border-radius: 99px; transition: width 0.5s ease; }
    .proto-val { font-size: 11px; color: var(--muted); width: 28px; text-align: right; flex-shrink: 0; }
    .proto-pct { font-size: 10px; color: var(--muted); width: 32px; text-align: right; flex-shrink: 0; }

    /* ════════════════════════════════════════
       Tab 4：订阅排名
    ════════════════════════════════════════ */
    .sub-list { display: flex; flex-direction: column; gap: 8px; }
    .sub-item {
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--glass-bg);
        transition: background 0.15s;
    }
    .sub-item:hover { background: var(--input-bg); }
    .sub-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; min-width: 0; }
    .sub-url {
        flex: 1; font-size: 11px; font-family: var(--font-mono, monospace);
        color: var(--muted); white-space: nowrap; overflow: hidden;
        text-overflow: ellipsis; min-width: 0;
    }
    .sub-rate  { font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .sub-bar-wrap { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
    .sub-bar  { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
    .sub-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 5px; font-size: 11px; color: var(--muted); }
    .tag-pill {
        padding: 1px 6px; border-radius: 4px;
        background: var(--input-bg); border: 1px solid var(--border);
        font-size: 10px; white-space: nowrap;
    }

    .bad-list {
        border-radius: 10px; border: 1px solid var(--border);
        overflow: hidden; background: var(--glass-bg);
    }
    .bad-item {
        display: flex; align-items: center; justify-content: space-between;
        padding: 8px 12px; border-bottom: 1px solid var(--border); gap: 8px;
    }
    .bad-item:last-child { border-bottom: none; }
    .bad-url {
        font-size: 11px; font-family: var(--font-mono, monospace);
        color: var(--muted); overflow: hidden; text-overflow: ellipsis;
        white-space: nowrap; flex: 1; min-width: 0;
    }
    .bad-count { font-size: 11px; color: var(--muted); flex-shrink: 0; }

    /* 加载动画 */

<script>
// ── 主题初始化（此页面自管理，admin.js module 也会接管切换） ──
(function () {
    const saved  = localStorage.getItem('theme');
    const prefer = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    applyTheme(saved || prefer);
})();

function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    const isDark = theme === 'dark';
    const moon   = document.getElementById('iconMoon');
    const sun    = document.getElementById('iconSun');
    const label  = document.getElementById('themeLabel');
    if (moon)  moon.style.display  = isDark ? 'block' : 'none';
    if (sun)   sun.style.display   = isDark ? 'none'  : 'block';
    if (label) label.textContent   = isDark ? '深色'  : '浅色';
    const btn = document.getElementById('themeToggle');
    if (btn) btn.setAttribute('aria-pressed', String(isDark));
}

document.getElementById('themeToggle')?.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    applyTheme(cur === 'dark' ? 'light' : 'dark');
});

// ── 存储键 ────────────────────────────────────────────────────
const STORAGE_KEY = 'subscheck_api_key';

function getKey() {
    try {
        return localStorage.getItem(STORAGE_KEY)
            || sessionStorage.getItem(STORAGE_KEY)
            || null;
    } catch { return null; }
}

// ── sfetch ────────────────────────────────────────────────────
async function sfetch(url, opts = {}) {
    const key = getKey();
    if (!key) return { ok: false, status: 401, error: '未认证' };
    opts.headers = { ...opts.headers, 'X-API-Key': key };
    try {
        const r       = await fetch(url, opts);
        const ct      = r.headers.get('content-type') || '';
        const text    = await r.text();
        const payload = ct.includes('application/json') ? JSON.parse(text) : text;
        if (r.status === 401) {
            try { localStorage.removeItem(STORAGE_KEY); } catch {}
            showLoginArea('API 密钥已失效，请重新输入。');
            return { ok: false, status: 401, payload };
        }
        return r.ok
            ? { ok: true,  status: r.status, payload }
            : { ok: false, status: r.status, payload };
    } catch (e) {
        return { ok: false, error: e.message };
    }
}

// ── 场景切换 ──────────────────────────────────────────────────
function showScene(name) {
    document.getElementById('loginScene').style.display  = name === 'login'  ? 'flex'  : 'none';
    document.getElementById('reportScene').style.display = name === 'report' ? 'flex'  : 'none';
}

// ── 登录场景子状态 ────────────────────────────────────────────
function showLoading() {
    showScene('login');
    _setBadge('Analysis Report');
    document.getElementById('placeholderMsg').style.display  = '';
    document.getElementById('inlineLoginArea').style.display = 'none';
    document.getElementById('retryArea').style.display       = 'none';
}

function showLoginArea(hint = '') {
    showScene('login');
    _setBadge('Auth Required');
    document.getElementById('placeholderMsg').style.display  = 'none';
    document.getElementById('inlineLoginArea').style.display = '';
    document.getElementById('retryArea').style.display       = 'none';
    const input  = document.getElementById('inlineApiKey');
    const hintEl = document.getElementById('loginHint');
    if (hint) {
        input.classList.add('error');
        hintEl.textContent = hint;
    } else {
        input.classList.remove('error');
        hintEl.textContent  = '';
        input.placeholder   = '输入 API 密钥...';
    }
    setTimeout(() => input.focus(), 50);
}

function showRetryArea(msg, badge = 'Error') {
    showScene('login');
    _setBadge(badge);
    document.getElementById('placeholderMsg').style.display  = 'none';
    document.getElementById('inlineLoginArea').style.display = 'none';
    document.getElementById('retryArea').style.display       = '';
    document.getElementById('retryMsg').textContent          = msg;
}

function _setBadge(text) {
    document.getElementById('placeholderBadge').textContent = text;
}

// ── Tab / Sidebar 切换（同步两套导航） ────────────────────────
function switchTab(name) {
    // 侧边栏
    document.querySelectorAll('.sidebar-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.tab === name));
    // 顶部 Tab
    document.querySelectorAll('.tab-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.tab === name));
    // 内容
    document.querySelectorAll('.tab-content').forEach(c =>
        c.classList.toggle('active', c.id === 'tab-' + name));
}

// ── 摘要折叠 ──────────────────────────────────────────────────
let summaryExpanded = false;
function toggleSummary() {
    summaryExpanded = !summaryExpanded;
    const body   = document.getElementById('summaryBody');
    const toggle = document.getElementById('summaryToggle');
    body.classList.toggle('collapsed', !summaryExpanded);
    toggle.textContent = summaryExpanded ? '收起 ↑' : '展开全文 ↓';
}

// ── 摘要文字高亮处理（数字 + 百分比） ────────────────────────
function highlightSummary(text) {
    if (!text) return '<span style="color:var(--muted)">暂无摘要</span>';
    // 将百分比、数字用 span 高亮，并在标点处换行使排版更舒适
    return text
        // 百分比高亮（绿色）
        .replace(/(\d+\.?\d*%)/g, '<span class="num num-ok">$1</span>')
        // 纯数字（4位以上视为统计数字）高亮
        .replace(/\b(\d{2,})\b/g, '<span class="num">$1</span>')
        // 中文句号后软换行（宽屏不强制折行，增加自然断点）
        .replace(/。/g, '。<wbr>');
}

// ── 内嵌登录 ──────────────────────────────────────────────────
async function inlineLogin() {
    const input  = document.getElementById('inlineApiKey');
    const btn    = document.getElementById('inlineLoginBtn');
    const hintEl = document.getElementById('loginHint');
    const k      = input?.value?.trim();

    input.classList.remove('error');
    hintEl.textContent = '';

    if (!k) {
        input.classList.add('error');
        hintEl.textContent = '请输入 API 密钥';
        input.focus();
        return;
    }
    btn.disabled = true;
    try {
        const resp = await fetch('/api/status', { headers: { 'X-API-Key': k } });
        if (resp.status === 401) {
            input.classList.add('error');
            hintEl.textContent = 'API 密钥无效，请重试';
            input.value = '';
            input.focus();
            return;
        }
        if (!resp.ok) {
            showRetryArea(`验证失败（HTTP ${resp.status}），请检查服务状态。`);
            return;
        }
        try { localStorage.setItem(STORAGE_KEY, k); } catch {}
        await loadReport();
    } catch (e) {
        showRetryArea(`网络错误：${e.message}`);
    } finally {
        btn.disabled = false;
    }
}

// ── 加载报告 ──────────────────────────────────────────────────
async function loadReport() {
    showLoading();
    const r = await sfetch('/api/analysis-report');

    if (!r.ok) {
        if (r.status !== 401)
            showRetryArea(`加载失败（HTTP ${r.status}），请检查服务是否正常。`);
        return;
    }
    if (!r.payload?.report) {
        showRetryArea('尚未生成检测报告，请先在主界面运行一次节点检测。', 'No Data');
        return;
    }
    try {
        const report = YAML.parse(r.payload.report);
        renderReport(report);
        showScene('report');
    } catch (e) {
        showRetryArea(`报告解析失败：${e.message}`);
    }
}

// ── 退出 ──────────────────────────────────────────────────────
function doLogout() {
    try { localStorage.removeItem(STORAGE_KEY); } catch {}
    showLoginArea();
}

// ── 初始化 ────────────────────────────────────────────────────
async function initPage() {
    if (!getKey()) { showLoginArea(); return; }
    await loadReport();
}

window.addEventListener('storage', e => {
    if (e.key === STORAGE_KEY && !e.newValue)
        showLoginArea('已在其他页面退出登录，请重新输入。');
});

// ══════════════════════════════════════════════════════════════
// 渲染函数
// ══════════════════════════════════════════════════════════════
function renderReport(r) {
    const ci = r.check_info       || {};
    const ga = r.global_analysis  || {};
    const sr = r.subs_ranking     || [];
    const sb = r.subs_ranking_bad || [];

    document.getElementById('navMeta').textContent =
        ci.check_time
            ? `${ci.check_time}  ·  耗时 ${ci.check_duration || '-'}`
            : '分析报告';

    // 更新侧边栏徽章数字
    const geoCount   = Object.keys(ga.geography_distribution  || {}).length;
    const protoCount = Object.keys(ga.protocol_distribution   || {}).length;
    _sb('sb-geo',   geoCount);
    _sb('sb-proto', protoCount);
    _sb('sb-subs',  sr.length);

    renderOverview(r, ci, ga, sr.length, geoCount, protoCount);
    renderGeo(ga);
    renderProto(ga);
    renderSubs(sr, sb);
}

function _sb(id, val) {
    const el = document.getElementById(id);
    if (el) el.textContent = val;
}

// ── Tab 1：概览 ──────────────────────────────────────────────
function renderOverview(r, ci, ga, subCount, geoCount, protoCount) {
    // 摘要高亮
    const raw = (r.summary || '').trim();
    const body = document.getElementById('summaryBody');
    body.innerHTML = highlightSummary(raw);

    // 文字超过 200 字时折叠
    if (raw.length > 200) {
        body.classList.add('collapsed');
        document.getElementById('summaryToggle').style.display = 'inline-block';
        summaryExpanded = false;
    } else {
        body.classList.remove('collapsed');
        document.getElementById('summaryToggle').style.display = 'none';
    }

    // 统计芯片
    const minSpeedVal = ci.check_min_speed;
    const minSpeedStr = (minSpeedVal && String(minSpeedVal) !== '0') ? minSpeedVal + ' KB/s' : '未开启';
    document.getElementById('infoChips').innerHTML = [
        { label: '可用节点', value: ga.alive_count   || 0,   accent: true },
        { label: '流量消耗', value: ci.check_traffic  || '-' },
        { label: '检测数量', value: ci.check_count    || '-' },
        { label: '速度下限', value: minSpeedStr },
    ].map(c => `
        <div class="info-chip${c.accent ? ' chip-accent' : ''}">
            <div class="chip-value">${c.value}</div>
            <div class="chip-label">${c.label}</div>
        </div>
    `).join('');

    // 线路质量
    const qm    = ga.quality_metrics || {};
    const cfd   = qm.cf_details      || {};
    const total = ga.alive_count     || 1;
    const cfCon   = cfd['consistent_¹⁺']  || {};
    const cfIncon = cfd['inconsistent_⁰']  || {};
    const cfBlock = cfd['blocked_⁻¹']      || {};
    let vps = {};
    for (const [k, v] of Object.entries(qm)) {
        if (k.startsWith('vps_details') && typeof v === 'object') { vps = v; break; }
    }
    const cfConTotal  = Object.values(cfCon).reduce((a, b) => a + b, 0);
    const vpsTotal    = Object.values(vps).reduce((a, b) => a + b, 0);
    const cfRatio     = qm.cf_consistent_ratio || `${Math.round(cfConTotal / total * 100)}%`;
    const vpsRatioStr = `${Math.round(vpsTotal / total * 100)}%`;

    document.getElementById('overviewExtra').innerHTML = `
        <div class="section-title" style="margin-top:16px">线路质量</div>
        <div class="overview-grid">
            <div class="stat-panel">
                <div class="panel-title">CF 中转 vs 独立 VPS</div>
                <div class="quality-row">
                    <div class="quality-item">
                        <div class="quality-val" style="color:var(--success)">${cfRatio}</div>
                        <div class="quality-label">CF 中转 ¹⁺</div>
                    </div>
                    <div class="quality-item">
                        <div class="quality-val" style="color:var(--idle)">${vpsRatioStr}</div>
                        <div class="quality-label">独立 VPS ²</div>
                    </div>
                </div>
                <div class="cf-breakdown">
                    ${cfGroup('CF 一致 ¹⁺',  cfCon,   'var(--success)')}
                    ${cfGroup('CF 不一致 ⁰', cfIncon, 'var(--warning)')}
                    ${Object.keys(cfBlock).length ? cfGroup('CF 异常 ⁻¹', cfBlock, 'var(--danger)') : ''}
                    ${cfGroup('独立 VPS ²',   vps,     'var(--idle)')}
                </div>
            </div>
            <div class="stat-panel">
                <div class="panel-title">快速导航</div>
                ${[
                    ['geo',   '地理分布', `${geoCount} 个地区`,
                     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`],
                    ['proto', '协议分析', `${protoCount} 种协议`,
                     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`],
                    ['subs',  '订阅排名', `${subCount} 个有效`,
                     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`],
                ].map(([tab, label, sub, icon]) => `
                    <button class="nav-card" onclick="switchTab('${tab}')">
                        <div class="nav-card-left">
                            ${icon}
                            <span class="nav-card-label">${label}</span>
                        </div>
                        <div class="nav-card-right">
                            ${sub}
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"/>
                            </svg>
                        </div>
                    </button>
                `).join('')}
            </div>
        </div>
    `;
}

function cfGroup(title, obj, color) {
    const entries = Object.entries(obj).sort((a, b) => b[1] - a[1]);
    if (!entries.length) return '';
    return `
        <div class="cf-group">
            <span class="cf-group-title" style="color:${color}">${title}</span>
            <span class="cf-tags">
                ${entries.map(([k, v]) => `<span class="cf-tag">${k}<em>${v}</em></span>`).join('')}
            </span>
        </div>
    `;
}

// ── Tab 2：地理分布 ──────────────────────────────────────────
function renderGeo(ga) {
    const geo     = ga.geography_distribution || {};
    const entries = Object.entries(geo).sort((a, b) => b[1] - a[1]);
    const maxVal  = entries[0]?.[1] || 1;

    if (!entries.length) {
        document.getElementById('geoBars').innerHTML =
            '<div style="padding:16px;color:var(--muted);font-size:13px">暂无地区数据</div>';
        return;
    }
    const half  = Math.ceil(entries.length / 2);
    const left  = entries.slice(0, half);
    const right = entries.slice(half);
    const barRow = ([k, v]) => `
        <div class="geo-row">
            <span class="geo-key">${k}</span>
            <div class="geo-bar-wrap">
                <div class="geo-bar" style="width:${Math.round(v / maxVal * 100)}%"></div>
            </div>
            <span class="geo-val">${v}</span>
        </div>
    `;
    document.getElementById('geoBars').innerHTML = `
        <div class="geo-col">${left.map(barRow).join('')}</div>
        <div class="geo-col">${right.length ? right.map(barRow).join('') : ''}</div>
    `;
}

// ── Tab 3：协议分析 ──────────────────────────────────────────
function renderProto(ga) {
    const proto   = ga.protocol_distribution || {};
    const total   = ga.alive_count           || 1;
    const entries = Object.entries(proto).sort((a, b) => b[1] - a[1]);

    if (!entries.length) {
        document.getElementById('protoContent').innerHTML =
            '<p style="color:var(--muted);font-size:13px">暂无协议数据</p>';
        return;
    }
    document.getElementById('protoContent').innerHTML = `
        <div class="section-title">协议分布（共 ${entries.length} 种）</div>
        <div class="stat-panel" style="max-width:560px">
            ${entries.map(([k, v]) => `
                <div class="proto-row">
                    <span class="proto-key">${k}</span>
                    <div class="proto-bar-wrap">
                        <div class="proto-bar" style="width:${Math.round(v / total * 100)}%"></div>
                    </div>
                    <span class="proto-val">${v}</span>
                    <span class="proto-pct">${Math.round(v / total * 100)}%</span>
                </div>
            `).join('')}
        </div>
    `;
}

// ── Tab 4：订阅排名 + 失效订阅 ──────────────────────────────
function renderSubs(subs, subsBad) {
    if (!subs.length) {
        document.getElementById('rankingContent').innerHTML =
            '<p style="color:var(--muted);font-size:13px">暂无有效订阅</p>';
    } else {
        document.getElementById('rankingContent').innerHTML = `
            <div class="section-title">订阅排名（${subs.length} 个有效）</div>
            <div class="sub-list">
                ${subs.map(s => {
                    const stats    = s.stats || {};
                    const rateStr  = String(stats.rate || '0%');
                    const rateNum  = parseFloat(rateStr);
                    const barColor = rateNum >= 10 ? 'var(--success)'
                                   : rateNum > 0   ? 'var(--warning)'
                                   : 'var(--danger)';
                    const locs   = Array.isArray(s.top_locations)
                        ? s.top_locations.join('').split('|').filter(Boolean) : [];
                    const protos = s.protocols
                        ? Object.entries(s.protocols).sort((a, b) => b[1] - a[1]) : [];
                    return `
                        <div class="sub-item">
                            <div class="sub-header">
                                <span class="sub-url" title="${esc(s.url)}">${esc(s.url)}</span>
                                <span class="sub-rate" style="color:${barColor}">${rateStr}</span>
                            </div>
                            <div class="sub-bar-wrap">
                                <div class="sub-bar" style="width:${Math.min(rateNum,100)}%;background:${barColor}"></div>
                            </div>
                            <div class="sub-meta">
                                <span>${stats.success||0} / ${stats.total||0} 节点</span>
                                ${locs.map(l => `<span class="tag-pill">${l}</span>`).join('')}
                                ${protos.map(([k,v]) => `<span class="tag-pill">${k}:${v}</span>`).join('')}
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
    }

    if (!subsBad.length) {
        document.getElementById('badContent').innerHTML = '';
        return;
    }
    document.getElementById('badContent').innerHTML = `
        <div class="section-title-toggle" onclick="toggleBad()">
            失效订阅&nbsp;<span style="font-weight:400;text-transform:none;letter-spacing:0">(${subsBad.length})</span>
            <span class="toggle-line"></span>
            <svg class="toggle-chevron" id="badChevron" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        </div>
        <div id="badList" style="display:none">
            <div class="bad-list">
                ${subsBad.map(s => {
                    const stats = s.stats || {};
                    return `
                        <div class="bad-item">
                            <span class="bad-url" title="${esc(s.url)}">${esc(s.url)}</span>
                            <span class="bad-count">${stats.success||0}/${stats.total||0}</span>
                        </div>
                    `;
                }).join('')}
            </div>
        </div>
    `;
}

function toggleBad() {
    const list    = document.getElementById('badList');
    const chevron = document.getElementById('badChevron');
    const open    = list.style.display === 'none';
    list.style.display = open ? '' : 'none';
    chevron.classList.toggle('open', open);
}

// ── XSS 防护 ──────────────────────────────────────────────────
function esc(str) {
    return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 启动 ──────────────────────────────────────────────────────
initPage();
</script>
<script type="module" src="/static/js/admin.js"></script>
</body>
