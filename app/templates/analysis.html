<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析报告 - Subs-Check-PRO</title>
    <link rel="icon" type="image/svg+xml" href="/static/icon/favicon.svg" />
    <link rel="stylesheet" href="/static/css/admin.css">
    <script src="/static/js/libs/yaml.bundle.js?v20260109"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 0 16px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* 大屏报告区撑宽到 960px，登录/占位卡片限制为 480px */
        .card-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 960px;
            padding: 24px 0 16px;
            box-sizing: border-box;
        }

        /* 占位/登录态：卡片居中且不超过 480px */
        #placeholderState .inner-limit {
            max-width: 480px;
            margin: 0 auto;
        }

        .theme-wrapper {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .card {
            border-radius: 16px;
            padding: 28px 32px;
            width: 100%;
            box-shadow: var(--glass-shadow);
            animation: slideIn 0.35s ease-out;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        /* 报告顶栏：badge + 退出按钮横排 */
        .report-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .report-topbar .status-badge {
            margin-bottom: 0;
        }

        /* 退出按钮 */
        .btn-logout {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: 11px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
        }
        .btn-logout svg { width: 12px; height: 12px; flex-shrink: 0; }
        .btn-logout:hover {
            color: var(--danger);
            border-color: var(--danger);
            background: color-mix(in srgb, var(--danger) 8%, transparent);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 18px;
            border: 1px solid var(--border);
            color: var(--idle);
        }

        h1 {
            font-size: 15px;
            font-weight: 600;
            margin: 0 0 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        h1 svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            color: var(--muted);
        }

        .desc {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
            margin: 0 0 22px;
        }

        /* 登录输入区 */
        .auth-area {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .auth-input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--fg);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
            font-family: inherit;
        }

        .auth-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
        }

        .auth-input.error {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--danger) 12%, transparent);
        }

        .auth-hint {
            font-size: 12px;
            color: var(--danger);
            margin: -4px 0 0;
            min-height: 16px;
        }

        .btn-auth {
            width: 100%;
            padding: 11px 14px;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            transition: opacity 0.18s, transform 0.12s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-auth:hover  { opacity: 0.88; transform: translateY(-1px); }
        .btn-auth:active { opacity: 0.95; transform: translateY(0); }
        .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-auth svg    { width: 15px; height: 15px; flex-shrink: 0; }

        /* 区块标题 */
        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            margin-top: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--muted);
        }

        .section-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .section-header-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            margin-top: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--muted);
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
        }

        .toggle-line   { flex: 1; height: 1px; background: var(--border); }
        .toggle-chevron { width: 12px; height: 12px; flex-shrink: 0; transition: transform 0.2s; }
        .toggle-chevron.open { transform: rotate(180deg); }

        .summary-block {
            padding: 14px 16px;
            background: var(--input-bg);
            border-radius: 10px;
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            font-size: 13px;
            color: var(--fg);
            line-height: 1.75;
            margin-bottom: 20px;
            word-break: break-all;
        }

        /* 统计芯片：大屏 4 列，小屏 2 列 */
        .info-chips {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 4px;
        }

        .info-chip {
            padding: 12px 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--glass-bg);
            text-align: center;
        }

        .chip-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--fg);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chip-label { font-size: 10px; color: var(--muted); margin-top: 3px; }
        .chip-accent .chip-value { color: var(--accent); }

        /* 大屏三列布局：地区 | 协议+质量 | 订阅排名 */
        .report-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 4px;
            align-items: start;
        }

        /* 大屏时订阅排名独占一列 */
        @media (min-width: 800px) {
            .report-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .stat-panel {
            padding: 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--glass-bg);
        }

        .panel-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .geo-row  { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
        .geo-key  { font-size: 11px; font-weight: 600; width: 24px; flex-shrink: 0; color: var(--fg); }
        .geo-bar-wrap { flex: 1; height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
        .geo-bar  { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; }
        .geo-val  { font-size: 10px; color: var(--muted); width: 18px; text-align: right; flex-shrink: 0; }

        .proto-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
        .proto-key { font-size: 11px; font-weight: 600; width: 52px; flex-shrink: 0; }
        .proto-bar-wrap { flex: 1; height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
        .proto-bar { height: 100%; background: var(--warning); border-radius: 99px; transition: width 0.4s ease; }
        .proto-val { font-size: 10px; color: var(--muted); width: 18px; text-align: right; flex-shrink: 0; }

        .quality-row { display: flex; gap: 8px; margin: 8px 0 10px; }
        .quality-item {
            flex: 1; text-align: center; padding: 8px 4px;
            border-radius: 8px; background: var(--input-bg); border: 1px solid var(--border);
        }
        .quality-val   { font-size: 18px; font-weight: 700; }
        .quality-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

        .cf-breakdown { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
        .cf-group { display: flex; align-items: flex-start; gap: 6px; font-size: 11px; }
        .cf-group-title { flex-shrink: 0; width: 72px; font-weight: 600; padding-top: 2px; font-size: 10px; }
        .cf-tags  { display: flex; flex-wrap: wrap; gap: 3px; }
        .cf-tag   {
            display: inline-flex; align-items: center; gap: 2px;
            padding: 1px 6px; border-radius: 99px;
            border: 1px solid var(--border); font-size: 10px; background: var(--glass-bg);
        }
        .cf-tag em { font-style: normal; color: var(--muted); }

        .sub-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
        .sub-item {
            padding: 10px 12px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--glass-bg); transition: background 0.15s;
        }
        .sub-item:hover { background: var(--input-bg); }
        .sub-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; min-width: 0; }
        .sub-url {
            flex: 1; font-size: 11px; font-family: var(--font-mono, monospace);
            color: var(--muted); white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; min-width: 0;
        }
        .sub-rate  { font-size: 13px; font-weight: 700; flex-shrink: 0; }
        .sub-bar-wrap { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
        .sub-bar  { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
        .sub-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 5px; font-size: 11px; color: var(--muted); }
        .tag-pill {
            padding: 1px 6px; border-radius: 4px;
            background: var(--input-bg); border: 1px solid var(--border);
            font-size: 10px; white-space: nowrap;
        }

        .bad-list {
            border-radius: 10px; border: 1px solid var(--border);
            overflow: hidden; background: var(--glass-bg); margin-bottom: 4px;
        }
        .bad-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 7px 12px; border-bottom: 1px solid var(--border); gap: 8px;
        }
        .bad-item:last-child { border-bottom: none; }
        .bad-url {
            font-size: 11px; font-family: var(--font-mono, monospace);
            color: var(--muted); overflow: hidden; text-overflow: ellipsis;
            white-space: nowrap; flex: 1; min-width: 0;
        }
        .bad-count { font-size: 11px; color: var(--muted); flex-shrink: 0; }

        /* 加载动画 */
        .loading-dots::after {
            content: '';
            animation: dots 1.2s steps(4, end) infinite;
        }
        @keyframes dots {
            0%  { content: ''; }   25% { content: '.'; }
            50% { content: '..'; } 75% { content: '...'; }
        }

        .card-footer {
            margin-top: 28px; padding-top: 16px;
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand-info {
            display: flex; align-items: center; gap: 7px;
            font-size: 12px; font-weight: 700; color: var(--muted);
        }
        .brand-info img { width: 16px; height: 16px; }
        .footer-meta { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

        .footer-outsie {
            width: 100%; max-width: 960px; padding: 12px 0 24px;
            display: flex; flex-direction: column; align-items: center; gap: 10px; flex-shrink: 0;
        }
        .footer-icons  { display: flex; align-items: center; gap: 14px; }
        .footer-icon   { width: 18px; height: 18px; opacity: 0.45; transition: opacity 0.15s; display: block; }
        .footer-icons a:hover .footer-icon { opacity: 0.85; }
        .footer-copy   { font-size: 11px; color: var(--muted); text-align: center; line-height: 1.6; }
        .footer-copy a { color: var(--muted); text-decoration: none; }
        .footer-copy a:hover { color: var(--accent); }

        code {
            font-family: var(--font-mono, monospace);
            background: var(--placehoder-bg, rgba(0,0,0,.06));
            color: var(--danger); padding: 1px 5px; border-radius: 4px; font-size: 11px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .card { padding: 22px 16px 16px; }
            .report-grid  { grid-template-columns: 1fr; }
            .info-chips   { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

<body>

    <!-- 主题切换按钮（fixed，始终右上角，切换逻辑由 admin.js 接管） -->
    <div class="theme-wrapper">
        <div class="theme-toggle" role="group" aria-label="主题切换" style="display:flex;align-items:center;">
            <button id="themeToggle" class="icon-btn" aria-pressed="false" aria-label="切换主题" title="切换主题">
                <svg class="icon" id="iconMoon" width="20" height="20" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1"  x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22"  y1="4.22"  x2="5.64"  y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1"  y1="12" x2="3"  y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
                    <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
                </svg>
                <svg class="icon" id="iconSun" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="card-wrapper">
        <div class="card">

            <!-- ① 占位区：加载中 / 未登录 / 错误，初始可见 -->
            <div id="placeholderState">
                <div class="inner-limit">
                    <div class="status-badge" id="placeholderBadge">Analysis Report</div>
                    <h1>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="20" x2="18" y2="10"/>
                            <line x1="12" y1="20" x2="12" y2="4"/>
                            <line x1="6"  y1="20" x2="6"  y2="14"/>
                            <line x1="2"  y1="20" x2="22" y2="20"/>
                        </svg>
                        检测结果分析
                    </h1>

                    <!-- 加载中 -->
                    <p class="desc" id="placeholderMsg" style="display:none">
                        正在获取报告<span class="loading-dots"></span>
                    </p>

                    <!-- 未登录：内嵌登录框 -->
                    <div id="inlineLoginArea" style="display:none">
                        <p class="desc">请输入 API 密钥以查看检测分析报告。</p>
                        <div class="auth-area">
                            <input class="auth-input" type="password" id="inlineApiKey"
                                   placeholder="输入 API 密钥..."
                                   autocomplete="current-password"
                                   onkeydown="if(event.keyCode===13)inlineLogin()">
                            <p class="auth-hint" id="loginHint"></p>
                            <button class="btn-auth" id="inlineLoginBtn" onclick="inlineLogin()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="5" y1="12" x2="19" y2="12"/>
                                    <polyline points="12 5 19 12 12 19"/>
                                </svg>
                                验证并查看
                            </button>
                        </div>
                    </div>

                    <!-- 错误 / 无数据 -->
                    <div id="retryArea" style="display:none">
                        <p class="desc" id="retryMsg"></p>
                        <button class="btn-auth" onclick="initPage()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="1 4 1 10 7 10"/>
                                <path d="M3.51 15a9 9 0 1 0 .49-3.33"/>
                            </svg>
                            重试
                        </button>
                    </div>

                    <div class="card-footer">
                        <div class="brand-info">
                            <img src="/static/icon/favicon.svg" alt="logo">Subs-Check-PRO
                        </div>
                        <div class="footer-meta">Analysis Report</div>
                    </div>
                </div>
            </div>

            <!-- ② 报告内容区：由 JS 填充后显示 -->
            <div id="reportState" style="display:none">

                <!-- 顶栏：badge + 退出按钮 -->
                <div class="report-topbar">
                    <div class="status-badge">Analysis Report</div>
                    <button class="btn-logout" onclick="doLogout()" title="退出登录">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>

                        退出
                    </button>
                </div>

                <h1>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="20" x2="18" y2="10"/>
                        <line x1="12" y1="20" x2="12" y2="4"/>
                        <line x1="6"  y1="20" x2="6"  y2="14"/>
                        <line x1="2"  y1="20" x2="22" y2="20"/>
                    </svg>
                    检测结果分析
                </h1>
                <p class="desc" id="reportMeta"></p>

                <!-- 摘要 -->
                <div class="summary-block" id="summaryBlock"></div>

                <!-- 统计芯片 -->
                <div class="info-chips" id="infoChips"></div>

                <!-- 全局统计（地区 + 协议/质量） -->
                <div id="globalSection"></div>

                <!-- 订阅排名 -->
                <div id="rankingSection"></div>

                <!-- 失效订阅 -->
                <div id="badSection"></div>

                <div class="card-footer">
                    <div class="brand-info">
                        <img src="/static/icon/favicon.svg" alt="logo">Subs-Check-PRO
                    </div>
                    <div class="footer-meta" id="reportFooterMeta">Analysis Report</div>
                </div>
            </div>

        </div>
    </div>

    <div class="footer-outsie">
        <div class="footer-icons">
            <a id="githubUrlBtn" href="#" title="GitHub 项目" aria-label="GitHub 项目">
                <img src="/static/icon/github.svg" alt="GitHub" class="footer-icon" />
            </a>
            <a id="dockerUrlBtn" href="#" title="Docker 镜像" aria-label="Docker 镜像">
                <img src="/static/icon/docker.svg" alt="Docker" class="footer-icon" />
            </a>
            <a id="telegramUrlBtn" href="https://t.me/subs_check_pro" title="Telegram 群" aria-label="Telegram 群">
                <img src="/static/icon/telegram.svg" alt="Telegram" class="footer-icon" />
            </a>
        </div>
        <div class="footer-copy">
            © 2025 <a href="https://github.com/sinspired" target="_blank" rel="noopener">sinspired</a> ·
            <a href="https://www.gnu.org/licenses/gpl-3.0.html" target="_blank" rel="noopener">GPL-3.0 License</a>
        </div>
    </div>

    <script>
        // ── 主题初始化（读取存储值即时应用，切换逻辑由 admin.js 接管） ──
        (function () {
            const saved  = localStorage.getItem('theme');
            const prefer = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', saved || prefer);
        })();

        // ── 与 admin.js 共用的 localStorage 键名 ────────────────────
        const STORAGE_KEY = 'subscheck_api_key';

        function getKey() {
            try {
                return localStorage.getItem(STORAGE_KEY)
                    || sessionStorage.getItem(STORAGE_KEY)
                    || null;
            } catch { return null; }
        }

        // ── sfetch（本页独立实现，admin.js 是 module 不挂载到 window）──
        async function sfetch(url, opts = {}) {
            const key = getKey();
            if (!key) return { ok: false, status: 401, error: '未认证' };
            opts.headers = { ...opts.headers, 'X-API-Key': key };
            try {
                const r       = await fetch(url, opts);
                const ct      = r.headers.get('content-type') || '';
                const text    = await r.text();
                const payload = ct.includes('application/json') ? JSON.parse(text) : text;
                if (r.status === 401) {
                    try { localStorage.removeItem(STORAGE_KEY); } catch {}
                    showLoginArea('API 密钥已失效，请重新输入。');
                    return { ok: false, status: 401, payload };
                }
                return r.ok
                    ? { ok: true,  status: r.status, payload }
                    : { ok: false, status: r.status, payload };
            } catch (e) {
                return { ok: false, error: e.message };
            }
        }

        // ── 占位区三种子状态 ─────────────────────────────────────────

        /** 加载中 */
        function showLoading() {
            document.getElementById('placeholderState').style.display  = '';
            document.getElementById('reportState').style.display       = 'none';
            document.getElementById('placeholderBadge').textContent    = 'Analysis Report';
            document.getElementById('placeholderMsg').style.display    = '';
            document.getElementById('inlineLoginArea').style.display   = 'none';
            document.getElementById('retryArea').style.display         = 'none';
        }

        /** 未登录 / key 失效，展示内嵌登录框 */
        function showLoginArea(hint = '') {
            document.getElementById('placeholderState').style.display  = '';
            document.getElementById('reportState').style.display       = 'none';
            document.getElementById('placeholderBadge').textContent    = 'Auth Required';
            document.getElementById('placeholderMsg').style.display    = 'none';
            document.getElementById('inlineLoginArea').style.display   = '';
            document.getElementById('retryArea').style.display         = 'none';

            const input    = document.getElementById('inlineApiKey');
            const hintEl   = document.getElementById('loginHint');
            if (hint) {
                input.classList.add('error');
                hintEl.textContent = hint;
            } else {
                input.classList.remove('error');
                hintEl.textContent = '';
                input.placeholder  = '输入 API 密钥...';
            }
            input.focus();
        }

        /** 错误 / 暂无数据 */
        function showRetryArea(msg, badge = 'Error') {
            document.getElementById('placeholderState').style.display  = '';
            document.getElementById('reportState').style.display       = 'none';
            document.getElementById('placeholderBadge').textContent    = badge;
            document.getElementById('placeholderMsg').style.display    = 'none';
            document.getElementById('inlineLoginArea').style.display   = 'none';
            document.getElementById('retryArea').style.display         = '';
            document.getElementById('retryMsg').textContent            = msg;
        }

        // ── 内嵌登录 ──────────────────────────────────────────────────
        async function inlineLogin() {
            const input  = document.getElementById('inlineApiKey');
            const btn    = document.getElementById('inlineLoginBtn');
            const hintEl = document.getElementById('loginHint');
            const k      = input?.value?.trim();

            // 清空上次错误样式
            input.classList.remove('error');
            hintEl.textContent = '';

            if (!k) {
                input.classList.add('error');
                hintEl.textContent = '请输入 API 密钥';
                input.focus();
                return;
            }

            btn.disabled = true;

            try {
                const resp = await fetch('/api/status', { headers: { 'X-API-Key': k } });

                if (resp.status === 401) {
                    input.classList.add('error');
                    hintEl.textContent = 'API 密钥无效，请重试';
                    input.value = '';
                    input.focus();
                    return;
                }
                if (!resp.ok) {
                    showRetryArea(`验证失败（HTTP ${resp.status}），请检查服务状态。`);
                    return;
                }

                // 验证通过，持久化 key 并加载报告
                try { localStorage.setItem(STORAGE_KEY, k); } catch {}
                await loadReport();

            } catch (e) {
                showRetryArea(`网络错误：${e.message}`);
            } finally {
                btn.disabled = false;
            }
        }

        // ── 加载报告 ──────────────────────────────────────────────────
        async function loadReport() {
            showLoading();
            const r = await sfetch('/api/analysis-report');

            if (!r.ok) {
                // 401 已由 sfetch 内部回到登录框，其余显示重试
                if (r.status !== 401) {
                    showRetryArea(`加载失败（HTTP ${r.status}），请检查服务是否正常。`);
                }
                return;
            }

            if (!r.payload?.report) {
                showRetryArea('尚未生成检测报告，请先在主界面运行一次节点检测。', 'No Data');
                return;
            }

            try {
                const report = YAML.parse(r.payload.report);
                renderReport(report);
                document.getElementById('placeholderState').style.display = 'none';
                document.getElementById('reportState').style.display      = '';
            } catch (e) {
                showRetryArea(`报告解析失败：${e.message}`);
            }
        }

        // ── 退出登录 ──────────────────────────────────────────────────
        function doLogout() {
            try { localStorage.removeItem(STORAGE_KEY); } catch {}
            showLoginArea();
        }

        // ── 主初始化（重试按钮也调用此函数） ─────────────────────────
        async function initPage() {
            if (!getKey()) {
                showLoginArea();
                return;
            }
            await loadReport();
        }

        // ── 跨标签页退出：admin 页 doLogout 清除 key 后同步回到登录框 ──
        window.addEventListener('storage', e => {
            if (e.key === STORAGE_KEY && !e.newValue) {
                showLoginArea('已在其他页面退出登录，请重新输入。');
            }
        });

        // ── 渲染主函数 ────────────────────────────────────────────────
        function renderReport(r) {
            const ci = r.check_info       || {};
            const ga = r.global_analysis  || {};
            const sr = r.subs_ranking     || [];
            const sb = r.subs_ranking_bad || [];

            document.getElementById('summaryBlock').textContent =
                (r.summary || '').trim() || '暂无摘要';
            document.getElementById('reportMeta').textContent =
                `检测时间：${ci.check_time || '-'}  ·  耗时：${ci.check_duration || '-'}`;
            document.getElementById('reportFooterMeta').textContent =
                ci.check_time ? `@ ${ci.check_time}` : 'Analysis Report';

            renderInfoChips(ci, ga);
            renderGlobal(ga);
            renderRanking(sr);
            renderBad(sb);
        }

        // ── 统计芯片 ──────────────────────────────────────────────────
        function renderInfoChips(ci, ga) {
            const minSpeedVal = ci.check_min_speed;
            const minSpeedStr = (minSpeedVal && String(minSpeedVal) !== '0')
                ? minSpeedVal + ' KB/s' : '未开启';

            document.getElementById('infoChips').innerHTML = [
                { label: '可用节点', value: ga.alive_count    || 0,   accent: true },
                { label: '流量消耗', value: ci.check_traffic  || '-' },
                { label: '检测数量', value: ci.check_count    || '-' },
                { label: '速度下限', value: minSpeedStr },
            ].map(c => `
                <div class="info-chip${c.accent ? ' chip-accent' : ''}">
                    <div class="chip-value">${c.value}</div>
                    <div class="chip-label">${c.label}</div>
                </div>
            `).join('');
        }

        // ── 全局统计（地区 + 协议 + 线路质量） ──────────────────────
        function renderGlobal(ga) {
            const geo   = ga.geography_distribution || {};
            const proto = ga.protocol_distribution  || {};
            const qm    = ga.quality_metrics        || {};
            const cfd   = qm.cf_details             || {};
            const total = ga.alive_count            || 1;

            const geoEntries   = Object.entries(geo).sort((a, b) => b[1] - a[1]);
            const protoEntries = Object.entries(proto).sort((a, b) => b[1] - a[1]);
            const maxGeo       = geoEntries[0]?.[1] || 1;

            const cfCon   = cfd['consistent_¹⁺']  || {};
            const cfIncon = cfd['inconsistent_⁰']  || {};
            const cfBlock = cfd['blocked_⁻¹']      || {};

            let vps = {};
            for (const [k, v] of Object.entries(qm)) {
                if (k.startsWith('vps_details') && typeof v === 'object') { vps = v; break; }
            }

            const cfConTotal  = Object.values(cfCon).reduce((a, b) => a + b, 0);
            const vpsTotal    = Object.values(vps).reduce((a, b) => a + b, 0);
            const cfRatio     = qm.cf_consistent_ratio || `${Math.round(cfConTotal / total * 100)}%`;
            const vpsRatioStr = `${Math.round(vpsTotal / total * 100)}%`;

            document.getElementById('globalSection').innerHTML = `
                <div class="section-header">全局统计</div>
                <div class="report-grid">
                    <div class="stat-panel">
                        <div class="panel-title">地区分布（共 ${geoEntries.length} 个）</div>
                        ${geoEntries.map(([k, v]) => `
                            <div class="geo-row">
                                <span class="geo-key">${k}</span>
                                <div class="geo-bar-wrap">
                                    <div class="geo-bar" style="width:${Math.round(v / maxGeo * 100)}%"></div>
                                </div>
                                <span class="geo-val">${v}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="stat-panel">
                        <div class="panel-title">协议分布</div>
                        ${protoEntries.map(([k, v]) => `
                            <div class="proto-row">
                                <span class="proto-key">${k}</span>
                                <div class="proto-bar-wrap">
                                    <div class="proto-bar" style="width:${Math.round(v / total * 100)}%"></div>
                                </div>
                                <span class="proto-val">${v}</span>
                            </div>
                        `).join('')}
                        <div class="panel-title" style="margin-top:14px">线路质量</div>
                        <div class="quality-row">
                            <div class="quality-item">
                                <div class="quality-val" style="color:var(--success)">${cfRatio}</div>
                                <div class="quality-label">CF 中转 ¹⁺</div>
                            </div>
                            <div class="quality-item">
                                <div class="quality-val" style="color:var(--idle)">${vpsRatioStr}</div>
                                <div class="quality-label">独立 VPS ²</div>
                            </div>
                        </div>
                        <div class="cf-breakdown">
                            ${cfGroup('CF 一致 ¹⁺',  cfCon,   'var(--success)')}
                            ${cfGroup('CF 不一致 ⁰', cfIncon, 'var(--warning)')}
                            ${Object.keys(cfBlock).length ? cfGroup('CF 异常 ⁻¹', cfBlock, 'var(--danger)') : ''}
                            ${cfGroup('独立 VPS ²',   vps,     'var(--idle)')}
                        </div>
                    </div>
                </div>
            `;
        }

        function cfGroup(title, obj, color) {
            const entries = Object.entries(obj).sort((a, b) => b[1] - a[1]);
            if (!entries.length) return '';
            return `
                <div class="cf-group">
                    <span class="cf-group-title" style="color:${color}">${title}</span>
                    <span class="cf-tags">
                        ${entries.map(([k, v]) => `<span class="cf-tag">${k}<em>${v}</em></span>`).join('')}
                    </span>
                </div>
            `;
        }

        // ── 订阅排名 ──────────────────────────────────────────────────
        function renderRanking(subs) {
            if (!subs.length) {
                document.getElementById('rankingSection').innerHTML = '';
                return;
            }
            document.getElementById('rankingSection').innerHTML = `
                <div class="section-header">订阅排名（${subs.length} 个有效）</div>
                <div class="sub-list">
                    ${subs.map(s => {
                        const stats    = s.stats || {};
                        const rateStr  = String(stats.rate || '0%');
                        const rateNum  = parseFloat(rateStr);
                        const barColor = rateNum >= 10 ? 'var(--success)'
                                       : rateNum > 0   ? 'var(--warning)'
                                       : 'var(--danger)';
                        const locs = Array.isArray(s.top_locations)
                            ? s.top_locations.join('').split('|').filter(Boolean) : [];
                        const protos = s.protocols
                            ? Object.entries(s.protocols).sort((a, b) => b[1] - a[1]) : [];
                        return `
                            <div class="sub-item">
                                <div class="sub-header">
                                    <span class="sub-url" title="${esc(s.url)}">${esc(s.url)}</span>
                                    <span class="sub-rate" style="color:${barColor}">${rateStr}</span>
                                </div>
                                <div class="sub-bar-wrap">
                                    <div class="sub-bar" style="width:${Math.min(rateNum,100)}%;background:${barColor}"></div>
                                </div>
                                <div class="sub-meta">
                                    <span>${stats.success||0} / ${stats.total||0} 节点</span>
                                    ${locs.map(l => `<span class="tag-pill">${l}</span>`).join('')}
                                    ${protos.map(([k,v]) => `<span class="tag-pill">${k}:${v}</span>`).join('')}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        // ── 失效订阅 ──────────────────────────────────────────────────
        function renderBad(subsBad) {
            if (!subsBad.length) {
                document.getElementById('badSection').innerHTML = '';
                return;
            }
            document.getElementById('badSection').innerHTML = `
                <div class="section-header-toggle" onclick="toggleBad()">
                    失效订阅&nbsp;<span style="font-weight:400;text-transform:none;letter-spacing:0">(${subsBad.length})</span>
                    <span class="toggle-line"></span>
                    <svg class="toggle-chevron" id="badChevron" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </div>
                <div id="badList" style="display:none">
                    <div class="bad-list">
                        ${subsBad.map(s => {
                            const stats = s.stats || {};
                            return `
                                <div class="bad-item">
                                    <span class="bad-url" title="${esc(s.url)}">${esc(s.url)}</span>
                                    <span class="bad-count">${stats.success||0}/${stats.total||0}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function toggleBad() {
            const list    = document.getElementById('badList');
            const chevron = document.getElementById('badChevron');
            const open    = list.style.display === 'none';
            list.style.display = open ? '' : 'none';
            chevron.classList.toggle('open', open);
        }

        // ── XSS 防护 ──────────────────────────────────────────────────
        function esc(str) {
            return String(str)
                .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // ── 启动 ──────────────────────────────────────────────────────
        initPage();
    </script>
    <script type="module" src="/static/js/admin.js"></script>
</body>

</html>
