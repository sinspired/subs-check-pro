name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  releaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Delete existing release
        run: |
          gh release view ${{ github.ref_name }} &>/dev/null && \
            gh release delete ${{ github.ref_name }} --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    needs: [releaser]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false

      - name: Stage binaries for Docker build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p bin
          gh release download ${{ github.ref_name }} \
            --pattern "subs-check-pro_Linux_*.tar.gz" \
            --dir /tmp/assets

          declare -A arch_map=([x86_64]=amd64 [aarch64]=arm64 [armv7]=arm)
          for key in "${!arch_map[@]}"; do
            file="/tmp/assets/subs-check-pro_Linux_${key}.tar.gz"
            [ -f "$file" ] || { echo "Missing: $file"; continue; }
            tar xzf "$file" -C bin --transform="s/.*/subs-check-pro-linux-${arch_map[$key]}/" subs-check-pro
            echo "✓ bin/subs-check-pro-linux-${arch_map[$key]}"
          done

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          tags: |
            type=match,pattern=^v?(.*-(?:beta|alpha|rc|dev|snapshot).*?)$,group=1,enable=${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'dev') || contains(github.ref_name, 'snapshot') }}

            type=match,pattern=^v?(.*)$,group=1,enable=${{ !(contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'dev') || contains(github.ref_name, 'snapshot')) }}
          flavor: |
            latest=${{ !(contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'dev') || contains(github.ref_name, 'snapshot')) }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 利用 GitHub Actions cache 加速层缓存
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    # Telegram 通知
    runs-on: ubuntu-latest
    needs: [releaser, docker] # 依赖前两个 job，确保成功后运行
    steps:
      - name: Determine Notification Title
        id: meta
        run: |
          if [[ "${{ github.ref_name }}" =~ (beta|alpha|rc|dev|snapshot|test) ]]; then
            echo "title=🚧 *subs-check-pro 预发布*" >> $GITHUB_OUTPUT
          else
            echo "title=🚀 *subs-check-pro 更新*" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram message on push
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ${{ steps.meta.outputs.title }}

            版本: `${{ github.ref_name }}`
            项目: `${{ github.repository }}`
              
            🔗 [查看详情](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})
