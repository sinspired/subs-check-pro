name: Release

on:
  push:
    tags:
      - "9.9.9"
  workflow_dispatch:   # 允许手动测试

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  releaser:
    if: github.ref != 'refs/heads/v2'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      # 将 Go 的 bin 目录加到系统 PATH 中，防止 go-winres 找不到命令报错
      - name: Add GOPATH to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Setup UPX
        uses: crazy-max/ghaction-upx@v4
        with:
          install-only: true
          version: latest

      # 只有在推 Tag 发布时才删除旧 Release
      - name: Delete existing release (if exists)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release view ${{ github.ref_name }} &>/dev/null && \
            gh release delete ${{ github.ref_name }} --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 【彻底修复】手动触发时强制使用 --snapshot（避免无 Tag 报错）
      # 正式推 Tag 时执行标准 release 流程
      - name: Create GitHub release (Windows x64 only)
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: >-
            release 
            --clean 
            --skip=validate
            ${{ github.event_name == 'workflow_dispatch' && '--snapshot' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 将生成的 zip 压缩包上传到 GitHub Actions 的 Artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: subs-check-pro-windows-x64
          path: dist/*.zip
          retention-days: 7
