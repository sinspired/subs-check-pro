version: 2

before:
  hooks:
    - go mod tidy
    - go get -u github.com/sinspired/subs-check-pro-webui
    - go install github.com/tc-hib/go-winres@latest
    - go generate ./...

release:
  # 自动检测是否为预发布版本 (如 v2.5.0-rc.1 会自动标记为 Pre-release)
  prerelease: auto

  # Release 顶部说明模板
  header: |
    ## 🚀 subs-check-pro {{ .Tag }} ({{ .Date }})

    欢迎使用最新版本！本版本带来了诸多优化与修复。

    📢 **社区与交流反馈：**
    - 👥 Telegram 交流群组：[subs-check性能版](https://t.me/subs_check_pro)
    - 📣 Telegram 通知频道：[关注频道](https://t.me/sinspired_ai)

  # 底部说明模板
  footer: |
    ---
    💡 **完整变更日志**: [{{ .PreviousTag }}...{{ .Tag }}]({{ .GitURL }}/compare/{{ .PreviousTag }}...{{ .Tag }})
    感谢所有提交代码与提出反馈的开发者！
    💬 遇到任何 Bug 或功能建议，欢迎提交 Issue 或前往 Telegram 群组反馈。

# 变更日志配置
changelog:
  sort: desc
  use: github
  # 过滤掉不需要显示在日志中的提交
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^style:"
      - "^Merge pull request"
      - "^Merge branch"
      - "go mod tidy"
      - "^(?i)chore\\(doc\\):" # 过滤单纯的 README 调整

  format: "{{ .SHA }}: {{ .Message }}"
  # 提交分组配置
  groups:
    - title: "✨ 新功能 (Features)"
      regexp: "^(?i)feat(\\([\\w-]+\\))?:+.*$"
      order: 0
    - title: "🐛 Bug 修复 (Bug Fixes)"
      regexp: "^(?i)fix(\\([\\w-]+\\))?:+.*$"
      order: 1
    - title: "🚀 性能优化 (Performance)"
      regexp: "^(?i)perf(\\([\\w-]+\\))?:+.*$"
      order: 2
    - title: "🔧 重构与工程维护 (Refactor & Maintenance)"
      regexp: "^(?i)(chore|refactor|build|ci)(\\([\\w-]+\\))?:+.*$"
      order: 3
    - title: "📝 文档更新 (Documentation)"
      regexp: "^(?i)docs(\\([\\w-]+\\))?:+.*$"
      order: 4
    - title: "📦 其他变更"
      order: 999

# 构建配置（仅保留 Windows .exe 编译目标）
builds:
  - id: subs-check-pro
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=jsonv2
    targets:
      - windows_amd64   # 常见的 64位 Windows 电脑 (Intel/AMD)
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.Version={{ .Version }} -X main.CurrentCommit={{ .ShortCommit }}

# 归档配置
archives:
  - id: subs-check-pro
    builds:
      - subs-check-pro
    formats:
      - zip             # Windows 默认使用 zip 压缩包输出
    # 彻底解决了由于缺失 {{ end }} 导致的模板报错，改写为单行更稳固的格式
    name_template: "{{ .ProjectName }}_{{ title .Os }}_{{ if eq .Arch \"amd64\" }}x86_64{{ else }}{{ .Arch }}{{ end }}"

# 压缩可执行文件（仅保留 Windows 编译体积压缩）
upx:
  - ids: [subs-check-pro]
    enabled: true
    goos: [windows]
    goarch: [amd64]
